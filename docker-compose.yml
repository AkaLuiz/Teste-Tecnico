services:
  postgres:
    image: postgres:17-alpine
    container_name: cartorio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: AuthService/Dockerfile
    container_name: cartorio-auth-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: Host=postgres;Port=5432;Database=cartorio_auth;Username=postgres;Password=postgres
    ports:
      - "5167:5167"
    depends_on:
      postgres:
        condition: service_healthy

  registros-service:
    build:
      context: .
      dockerfile: RegistrosService/Dockerfile
    container_name: cartorio-registros-service
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__RegistrosDb: Host=postgres;Port=5432;Database=cartorio_registros;Username=postgres;Password=postgres
    ports:
      - "5026:5026"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cartorio-frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - registros-service

volumes:
  postgres-data:
